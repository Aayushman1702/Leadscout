<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LeadScout AI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="search-panel">
        <div>
          <h1>LeadScout AI</h1>
          <p>Find local businesses and enrich them with contact details.</p>
        </div>

        <form id="searchForm" class="form">
          <label>
            Location
            <input id="location" name="location" placeholder="Goregaon" required minlength="2" />
          </label>

          <label>
            State
            <select id="state" name="state">
              <option value="">Auto / Any</option>
              <option value="Andhra Pradesh">Andhra Pradesh</option>
              <option value="Arunachal Pradesh">Arunachal Pradesh</option>
              <option value="Assam">Assam</option>
              <option value="Bihar">Bihar</option>
              <option value="Chhattisgarh">Chhattisgarh</option>
              <option value="Goa">Goa</option>
              <option value="Gujarat">Gujarat</option>
              <option value="Haryana">Haryana</option>
              <option value="Himachal Pradesh">Himachal Pradesh</option>
              <option value="Jharkhand">Jharkhand</option>
              <option value="Karnataka">Karnataka</option>
              <option value="Kerala">Kerala</option>
              <option value="Madhya Pradesh">Madhya Pradesh</option>
              <option value="Maharashtra">Maharashtra</option>
              <option value="Manipur">Manipur</option>
              <option value="Meghalaya">Meghalaya</option>
              <option value="Mizoram">Mizoram</option>
              <option value="Nagaland">Nagaland</option>
              <option value="Odisha">Odisha</option>
              <option value="Punjab">Punjab</option>
              <option value="Rajasthan">Rajasthan</option>
              <option value="Sikkim">Sikkim</option>
              <option value="Tamil Nadu">Tamil Nadu</option>
              <option value="Telangana">Telangana</option>
              <option value="Tripura">Tripura</option>
              <option value="Uttar Pradesh">Uttar Pradesh</option>
              <option value="Uttarakhand">Uttarakhand</option>
              <option value="West Bengal">West Bengal</option>
              <option value="Delhi">Delhi</option>
              <option value="Jammu and Kashmir">Jammu and Kashmir</option>
              <option value="Ladakh">Ladakh</option>
              <option value="Puducherry">Puducherry</option>
            </select>
          </label>

          <label>
            Category
            <select id="category" name="category" required>
              <option value="all">All Businesses</option>
              <option value="cafe">Cafe</option>
              <option value="restaurant">Restaurant</option>
              <option value="food">Food & Snacks</option>
              <option value="hotel">Hotel</option>
              <option value="clinic">Clinic</option>
              <option value="hospital">Hospital</option>
              <option value="pharmacy">Pharmacy</option>
              <option value="bakery">Bakery</option>
              <option value="supermarket">Supermarket</option>
              <option value="gym">Gym / Fitness</option>
              <option value="beauty_salon">Beauty Salon</option>
              <option value="jewelry">Jewelry</option>
              <option value="clothes">Clothing Store</option>
              <option value="dentist">Dentist</option>
              <option value="school">School</option>
              <option value="bank">Bank</option>
              <option value="electronics">Electronics</option>
            </select>
          </label>

          <label>
            Limit
            <input id="limit" name="limit" type="number" min="1" max="500" value="100" />
          </label>

          <label>
            Popularity
            <select id="popularity" name="popularity_filter">
              <option value="">All</option>
              <option value="high">High</option>
              <option value="medium">Medium+</option>
              <option value="low">Low+</option>
            </select>
          </label>

          <button type="submit">Search Leads</button>
        </form>
      </section>

      <section class="results">
        <div class="results-header">
          <h2>Results</h2>
          <span id="status">Ready</span>
        </div>
        <div id="selectionControls" class="selection-controls">
          <label class="checkbox-label">
            <input id="selectAll" type="checkbox" />
            Select All
          </label>
          <span id="selectedCount">Selected: 0 Businesses</span>
        </div>
        <div id="resultsGrid" class="grid"></div>
      </section>
    </main>

    <div id="downloadBar" class="download-bar" hidden>
      <span id="downloadCount">Selected: 0 Businesses</span>
      <button id="downloadSelected" type="button">Download Selected</button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
